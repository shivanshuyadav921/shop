apiVersion: v1
kind: LimitRange
metadata:
  name: default-container-limits
  namespace: shop-platform
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "256Mi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: shop-platform-quota
  namespace: shop-platform
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "40"
    limits.memory: 80Gi
    pods: "120"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-namespace-only
  namespace: shop-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shop-platform
  namespace: shop-platform
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - api.shop.example.com
      secretName: shop-platform-tls
  rules:
    - host: api.shop.example.com
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 80
          - path: /invoices
            pathType: Prefix
            backend:
              service:
                name: invoice-service
                port:
                  number: 80
          - path: /payments
            pathType: Prefix
            backend:
              service:
                name: payment-service
                port:
                  number: 80
          - path: /wallet
            pathType: Prefix
            backend:
              service:
                name: wallet-service
                port:
                  number: 80
          - path: /fraud
            pathType: Prefix
            backend:
              service:
                name: fraud-service
                port:
                  number: 80
          - path: /ledger
            pathType: Prefix
            backend:
              service:
                name: ledger-service
                port:
                  number: 80
          - path: /compliance
            pathType: Prefix
            backend:
              service:
                name: compliance-service
                port:
                  number: 80
          - path: /analytics
            pathType: Prefix
            backend:
              service:
                name: analytics-service
                port:
                  number: 80
          - path: /audit
            pathType: Prefix
            backend:
              service:
                name: audit-service
                port:
                  number: 80
---
