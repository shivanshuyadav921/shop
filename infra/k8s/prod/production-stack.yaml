              path: /health
              port: 3007
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: audit-service
  namespace: shop-platform
spec:
  selector:
    app: audit-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3007
  type: ClusterIP
