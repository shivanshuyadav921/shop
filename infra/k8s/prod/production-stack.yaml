apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: shop-platform
spec:
  selector:
    app: prometheus
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: shop-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--web.enable-lifecycle'
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: shop-platform
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/alert-rules.yml
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']
    scrape_configs:
      - job_name: service-health
        metrics_path: /probe
        params:
          module: [http_2xx]
        static_configs:
          - targets:
              - http://auth-service/health
              - http://invoice-service/health
              - http://payment-service/health
              - http://wallet-service/health
              - http://fraud-service/health
              - http://compliance-service/health
              - http://ledger-service/health
              - http://analytics-service/health
              - http://audit-service/health
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: blackbox-exporter:9115

      - job_name: kubernetes-services
        kubernetes_sd_configs:
          - role: service
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
            action: replace
            regex: (.+):(?:\d+);(\d+)
            replacement: $1:$2

      - job_name: kubernetes-nodes
        kubernetes_sd_configs:
          - role: node
  alert-rules.yml: |
    groups:
      - name: availability
        rules:
          - alert: ServiceTargetDown
            expr: up == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "A monitored target is down"
              description: "Prometheus cannot scrape {{ $labels.instance }}."
          - alert: ErrorBudgetBurn
            expr: avg_over_time(up[30m]) < 0.9999
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "99.99% availability SLO burn"
              description: "Availability is below the 99.99% target over the last 30 minutes."

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: shop-platform
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
