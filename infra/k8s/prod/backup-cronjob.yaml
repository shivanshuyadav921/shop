apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: shop-platform
spec:
  schedule: "0 1 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: backup
              image: postgres:15-alpine
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: shop-platform-secrets
                      key: DATABASE_PASSWORD
              command:
                - sh
                - -c
                - |
                  mkdir -p /backups
                  pg_dumpall -h postgres -U shop | gzip -9 > /backups/shop-backup-$(date +%Y%m%d%H%M%S).sql.gz
                  find /backups -name 'shop-backup-*.sql.gz' -mtime +30 -delete
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
          restartPolicy: OnFailure
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: backup-storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-storage
  namespace: shop-platform
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 50Gi
