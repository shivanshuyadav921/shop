apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{service-name}}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: {{service-name}}
  template:
    metadata:
      labels:
        app: {{service-name}}
    spec:
      containers:
        - name: {{service-name}}
          image: {{image}}
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: {{service-name}}-config
            - secretRef:
                name: {{service-name}}-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
