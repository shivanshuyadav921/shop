apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/deployment.yaml
  - ../../base/service.yaml

images:
  - name: "{{image}}"
    newName: "{{image}}"
    newTag: staging

configMapGenerator:
  - name: "{{service-name}}-config"
    literals:
      - NODE_ENV=staging
      - PORT=3000

secretGenerator:
  - name: "{{service-name}}-secret"
    literals:
      - JWT_SECRET=replace-with-secret

commonLabels:
  environment: staging
