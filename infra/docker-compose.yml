version: '3.9'
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:8.2.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 2181:2181

  kafka:
    image: confluentinc/cp-kafka:8.2.1
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - 9092:9092

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop123
      POSTGRES_DB: shop_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - 5432:5432

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - 6379:6379

  auth-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth-service
    depends_on:
      - postgres
      - redis
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://shop:shop123@postgres:5432/shop_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=replace-with-strong-secret
      - JWT_EXPIRES_IN=15m
      - REFRESH_TOKEN_EXPIRY_DAYS=30
      - OTP_TTL_SECONDS=300
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX=200
      - MAX_LOGIN_ATTEMPTS=5
    ports:
      - 3000:3000

  ledger-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: ledger-service
    depends_on:
      - postgres
    environment:
      - PORT=3004
      - DATABASE_URL=postgresql://shop:shop123@postgres:5432/shop_db
      - EVENT_LOG_ENABLED=true
    ports:
      - 3004:3000

  compliance-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: compliance-service
    depends_on:
      - postgres
    environment:
      - PORT=3005
      - DATABASE_URL=postgresql://shop:shop123@postgres:5432/shop_db
      - COMPLIANCE_UPLOAD_PATH=/data/compliance/uploads
      - ALERT_EMAIL_FROM=compliance@shop.example.com
    ports:
      - 3005:3005
    volumes:
      - compliance-data:/data

  analytics-service:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: analytics-service
    depends_on:
      - postgres
    environment:
      - PORT=3010
      - DATABASE_URL=postgresql://shop:shop123@postgres:5432/shop_db
      - ANALYTICS_REPORT_CRON=0 2 * * *
      - ANALYTICS_WINDOW_DAYS=30
    ports:
      - 3010:3010

volumes:
  postgres-data:
  compliance-data:
