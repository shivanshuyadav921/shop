global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: 'service-health'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://auth-service:3000/health
          - http://invoice-service:3001/health
          - http://payment-service:3002/health
          - http://wallet-service:3003/health
          - http://fraud-service:3004/health
          - http://compliance-service:3005/health
          - http://ledger-service:3006/health
          - http://analytics-service:3010/health
          - http://audit-service:3007/health
        labels:
          group: services
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          group: database

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          group: cache

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']
        labels:
          group: streaming

  - job_name: 'blackbox-exporter'
    static_configs:
      - targets: ['blackbox-exporter:9115']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
