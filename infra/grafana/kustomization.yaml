apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: grafana-datasources
    files:
      - datasource.yml=provisioning/datasources/datasource.yml
  - name: grafana-dashboard-provider
    files:
      - dashboard.yml=provisioning/dashboards/dashboard.yml
  - name: grafana-enterprise-overview
    files:
      - enterprise-overview.json=dashboards/enterprise-overview.json

generatorOptions:
  disableNameSuffixHash: true
