name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Workspace build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: 'latest'

      - name: Install dependencies
        run: npm install

      - name: Build all packages
        run: npm run build --workspaces

      - name: Validate Kubernetes manifests
        run: kubectl kustomize infra/k8s/prod > /tmp/shop-platform.yaml

      - name: Validate Docker Compose files
        env:
          DATABASE_PASSWORD: ci-compose-validation-password
          GRAFANA_ADMIN_USER: ci-admin
          GRAFANA_ADMIN_PASSWORD: ci-compose-validation-grafana-password
          JWT_SECRET: ci-compose-validation-jwt-secret
          AUTH_NOTIFICATION_WEBHOOK_URL: https://example.invalid/auth-webhook
          AUTH_NOTIFICATION_WEBHOOK_TOKEN: ci-compose-validation-auth-webhook-token
          INTERNAL_API_TOKEN: ci-compose-validation-internal-api-token
          PAYMENT_PROVIDER_CONFIGS: '{"default":{"provider":"mock","enabled":true}}'
          COMPLIANCE_VERIFICATION_API_BASE_URL: https://example.invalid/compliance
          COMPLIANCE_VERIFICATION_API_TOKEN: ci-compose-validation-compliance-token
        run: |
          docker compose -f infra/docker-compose.yml config
          docker compose -f infra/docker-compose.prod.yml config

  docker-publish:
    name: Build and publish service images
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    env:
      REGISTRY_URL_CONFIGURED: ${{ secrets.REGISTRY_URL || vars.REGISTRY_URL || '' }}
      REGISTRY_URL: ${{ secrets.REGISTRY_URL || vars.REGISTRY_URL || format('ghcr.io/{0}', github.repository_owner) }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - invoice-service
          - payment-service
          - wallet-service
          - fraud-service
          - ledger-service
          - compliance-service
          - analytics-service
          - audit-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve registry coordinates
        id: registry
        shell: bash
        run: |
          raw="${REGISTRY_URL:-}"
          if [ -z "$raw" ]; then
            echo 'REGISTRY_URL did not resolve. Configure REGISTRY_URL as a repository secret or variable, or allow the GHCR fallback.' >&2
            exit 1
          fi

          raw="${raw#http://}"
          raw="${raw#https://}"
          raw="${raw%/}"

          if [ -z "$raw" ] || [ "$raw" = "/" ]; then
            echo 'REGISTRY_URL is empty or invalid' >&2
            exit 1
          fi

          registry_host="${raw%%/*}"
          registry_path="${raw#${registry_host}}"
          registry_path="${registry_path#/}"

          if [ -z "$registry_host" ] || [[ "$registry_host" =~ [[:space:]] ]]; then
            echo 'REGISTRY_URL is empty or invalid' >&2
            exit 1
          fi

          if [ -n "$registry_path" ]; then
            image_base="${registry_host}/${registry_path}/shop"
          else
            image_base="${registry_host}/shop"
          fi

          echo "Registry configured"
          if [ -n "${REGISTRY_URL_CONFIGURED:-}" ]; then
            registry_source="configured"
          else
            registry_source="fallback"
          fi

          echo "REGISTRY_URL=${raw}" >> "$GITHUB_ENV"
          echo "registry_host=${registry_host}" >> "$GITHUB_OUTPUT"
          echo "image_base=${image_base}" >> "$GITHUB_OUTPUT"
          echo "registry_source=${registry_source}" >> "$GITHUB_OUTPUT"

      - name: Resolve registry credentials
        id: registry-auth
        shell: bash
        env:
          REGISTRY_USERNAME_SECRET: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD_SECRET: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          username="${REGISTRY_USERNAME_SECRET:-}"
          password="${REGISTRY_PASSWORD_SECRET:-}"

          if [ -n "$username" ] && [ -n "$password" ]; then
            :
          elif [ "${{ steps.registry.outputs.registry_host }}" = "ghcr.io" ]; then
            username="${GITHUB_ACTOR}"
            password="${{ github.token }}"
          else
            echo 'Registry credentials are missing for the configured registry' >&2
            exit 1
          fi

          echo "::add-mask::$username"
          echo "::add-mask::$password"
          echo "username=${username}" >> "$GITHUB_OUTPUT"
          echo "password=${password}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry.outputs.registry_host }}
          username: ${{ steps.registry-auth.outputs.username }}
          password: ${{ steps.registry-auth.outputs.password }}

      - name: Verify resolved registry for matrix build
        shell: bash
        run: |
          if [ -z "${REGISTRY_URL:-}" ]; then
            echo 'REGISTRY_URL is empty or invalid' >&2
            exit 1
          fi

          echo "Registry configured"
          echo "${{ steps.registry.outputs.registry_host }}"
          echo "${{ steps.registry.outputs.image_base }}"

      - name: Build and push service image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.registry.outputs.image_base }}/${{ matrix.service }}:${{ github.sha }}
            ${{ steps.registry.outputs.image_base }}/${{ matrix.service }}:latest
          file: ./Dockerfile
          build-args: |
            NODE_ENV=production
            SERVICE_NAME=${{ matrix.service }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to Kubernetes
    needs: docker-publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      REGISTRY_URL_CONFIGURED: ${{ secrets.REGISTRY_URL || vars.REGISTRY_URL || '' }}
      REGISTRY_URL: ${{ secrets.REGISTRY_URL || vars.REGISTRY_URL || format('ghcr.io/{0}', github.repository_owner) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve registry coordinates
        id: registry
        shell: bash
        run: |
          raw="${REGISTRY_URL:-}"
          if [ -z "$raw" ]; then
            echo 'REGISTRY_URL did not resolve. Configure REGISTRY_URL as a repository secret or variable, or allow the GHCR fallback.' >&2
            exit 1
          fi

          raw="${raw#http://}"
          raw="${raw#https://}"
          raw="${raw%/}"

          if [ -z "$raw" ] || [ "$raw" = "/" ]; then
            echo 'REGISTRY_URL is empty or invalid' >&2
            exit 1
          fi

          registry_host="${raw%%/*}"
          registry_path="${raw#${registry_host}}"
          registry_path="${registry_path#/}"

          if [ -z "$registry_host" ] || [[ "$registry_host" =~ [[:space:]] ]]; then
            echo 'REGISTRY_URL is empty or invalid' >&2
            exit 1
          fi

          if [ -n "$registry_path" ]; then
            image_base="${registry_host}/${registry_path}/shop"
          else
            image_base="${registry_host}/shop"
          fi

          echo "Registry configured"
          echo "REGISTRY_URL=${raw}" >> "$GITHUB_ENV"
          echo "image_base=${image_base}" >> "$GITHUB_OUTPUT"

      - name: Verify resolved registry for deploy
        shell: bash
        run: |
          if [ -z "${REGISTRY_URL:-}" ]; then
            echo 'REGISTRY_URL is empty or invalid' >&2
            exit 1
          fi

          echo "Registry configured"
          echo "${{ steps.registry.outputs.image_base }}"

      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: 'latest'

      - name: Decode kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 --decode > kubeconfig
        shell: bash

      - name: Deploy with Kustomize
        run: |
          find infra/k8s/prod -type f -name '*.yaml' -exec sed -i "s#REPLACE_WITH_REGISTRY#${{ steps.registry.outputs.image_base }}#g" {} +
          KUBECONFIG=kubeconfig kubectl apply -k infra/k8s/prod
        shell: bash

      - name: Verify rollout status
        run: |
          KUBECONFIG=kubeconfig kubectl rollout status deployment/auth-service --timeout=180s || true
          KUBECONFIG=kubeconfig kubectl rollout status deployment/invoice-service --timeout=180s || true
          KUBECONFIG=kubeconfig kubectl rollout status deployment/payment-service --timeout=180s || true
          KUBECONFIG=kubeconfig kubectl rollout status deployment/wallet-service --timeout=180s || true
          KUBECONFIG=kubeconfig kubectl rollout status deployment/fraud-service --timeout=180s || true
          KUBECONFIG=kubeconfig kubectl rollout status deployment/ledger-service --timeout=180s || true
          KUBECONFIG=kubeconfig kubectl rollout status deployment/compliance-service --timeout=180s || true
          KUBECONFIG=kubeconfig kubectl rollout status deployment/analytics-service --timeout=180s || true
          KUBECONFIG=kubeconfig kubectl rollout status deployment/audit-service --timeout=180s || true
        shell: bash
