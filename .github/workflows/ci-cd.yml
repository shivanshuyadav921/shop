name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Workspace build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: 'latest'

      - name: Install dependencies
        run: npm install

      - name: Build all packages
        run: npm run build --workspaces

      - name: Validate Kubernetes manifests
        run: kubectl kustomize infra/k8s/prod > /tmp/shop-platform.yaml

      - name: Validate Docker Compose files
        env:
          DATABASE_PASSWORD: ci-compose-validation-password
          GRAFANA_ADMIN_USER: ci-admin
          GRAFANA_ADMIN_PASSWORD: ci-compose-validation-grafana-password
          JWT_SECRET: ci-compose-validation-jwt-secret
          AUTH_NOTIFICATION_WEBHOOK_URL: https://example.invalid/auth-webhook
          AUTH_NOTIFICATION_WEBHOOK_TOKEN: ci-compose-validation-auth-webhook-token
          INTERNAL_API_TOKEN: ci-compose-validation-internal-api-token
          PAYMENT_PROVIDER_CONFIGS: '{"default":{"provider":"mock","enabled":true}}'
          COMPLIANCE_VERIFICATION_API_BASE_URL: https://example.invalid/compliance
          COMPLIANCE_VERIFICATION_API_TOKEN: ci-compose-validation-compliance-token
        run: |
          docker compose -f infra/docker-compose.yml config
          docker compose -f infra/docker-compose.prod.yml config

  resolve-coordinates:
    name: Resolve workflow coordinates
    needs: build
    runs-on: ubuntu-latest
    outputs:
      registry_url: ${{ steps.coordinates.outputs.registry_url }}
      registry_host: ${{ steps.coordinates.outputs.registry_host }}
      registry_path: ${{ steps.coordinates.outputs.registry_path }}
      repository_owner: ${{ steps.coordinates.outputs.repository_owner }}
      repository_name: ${{ steps.coordinates.outputs.repository_name }}
      image_base: ${{ steps.coordinates.outputs.image_base }}
      image_tag: ${{ steps.coordinates.outputs.image_tag }}
      short_sha: ${{ steps.coordinates.outputs.short_sha }}
      branch_name: ${{ steps.coordinates.outputs.branch_name }}
      registry_source: ${{ steps.coordinates.outputs.registry_source }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve coordinates
        id: coordinates
        uses: ./.github/actions/resolve-coordinates
        with:
          registry_url: ${{ secrets.REGISTRY_URL || vars.REGISTRY_URL || '' }}
          repository: ${{ github.repository }}
          repository_owner: ${{ github.repository_owner }}
          repository_name: ${{ github.event.repository.name || '' }}
          sha: ${{ github.sha }}
          ref: ${{ github.ref }}
          head_ref: ${{ github.head_ref || '' }}
          event_name: ${{ github.event_name }}

      - name: Verify resolved coordinates
        shell: bash
        run: |
          set -euo pipefail

          for value in \
            "${{ steps.coordinates.outputs.registry_url }}" \
            "${{ steps.coordinates.outputs.registry_host }}" \
            "${{ steps.coordinates.outputs.repository_owner }}" \
            "${{ steps.coordinates.outputs.repository_name }}" \
            "${{ steps.coordinates.outputs.image_base }}" \
            "${{ steps.coordinates.outputs.image_tag }}" \
            "${{ steps.coordinates.outputs.short_sha }}" \
            "${{ steps.coordinates.outputs.branch_name }}"; do
            if [ -z "$value" ] || [ "$value" = "null" ] || [ "$value" = "undefined" ]; then
              echo "Coordinate resolution failed" >&2
              exit 1
            fi
          done

          echo "Registry configured"
          echo "${{ steps.coordinates.outputs.registry_host }}"
          echo "${{ steps.coordinates.outputs.image_base }}"
          echo "${{ steps.coordinates.outputs.image_tag }}"

  docker-publish:
    name: Build and publish service images
    needs:
      - build
      - resolve-coordinates
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - invoice-service
          - payment-service
          - wallet-service
          - fraud-service
          - ledger-service
          - compliance-service
          - analytics-service
          - audit-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify resolved coordinates
        shell: bash
        run: |
          set -euo pipefail

          for value in \
            "${{ needs.resolve-coordinates.outputs.registry_url }}" \
            "${{ needs.resolve-coordinates.outputs.registry_host }}" \
            "${{ needs.resolve-coordinates.outputs.image_base }}" \
            "${{ needs.resolve-coordinates.outputs.image_tag }}"; do
            if [ -z "$value" ] || [ "$value" = "null" ] || [ "$value" = "undefined" ]; then
              echo "Coordinate resolution failed" >&2
              exit 1
            fi
          done

          echo "Registry configured"
          echo "${{ needs.resolve-coordinates.outputs.registry_host }}"
          echo "${{ needs.resolve-coordinates.outputs.image_base }}"
          echo "${{ needs.resolve-coordinates.outputs.image_tag }}"

      - name: Resolve registry credentials
        id: registry-auth
        shell: bash
        env:
          REGISTRY_USERNAME_SECRET: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD_SECRET: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          username="${REGISTRY_USERNAME_SECRET:-}"
          password="${REGISTRY_PASSWORD_SECRET:-}"

          if [ -n "$username" ] && [ -n "$password" ]; then
            :
          elif [ "${{ needs.resolve-coordinates.outputs.registry_host }}" = "ghcr.io" ]; then
            username="${GITHUB_ACTOR}"
            password="${{ github.token }}"
          else
            echo 'Registry credentials are missing for the configured registry' >&2
            exit 1
          fi

          echo "::add-mask::$username"
          echo "::add-mask::$password"
          echo "username=${username}" >> "$GITHUB_OUTPUT"
          echo "password=${password}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ needs.resolve-coordinates.outputs.registry_host }}
          username: ${{ steps.registry-auth.outputs.username }}
          password: ${{ steps.registry-auth.outputs.password }}

      - name: Build and push service image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ needs.resolve-coordinates.outputs.image_base }}/${{ matrix.service }}:${{ needs.resolve-coordinates.outputs.image_tag }}
            ${{ needs.resolve-coordinates.outputs.image_base }}/${{ matrix.service }}:latest
          file: ./Dockerfile
          build-args: |
            NODE_ENV=production
            SERVICE_NAME=${{ matrix.service }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to Kubernetes
    needs:
      - docker-publish
      - resolve-coordinates
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify resolved coordinates
        shell: bash
        run: |
          set -euo pipefail

          for value in \
            "${{ needs.resolve-coordinates.outputs.registry_url }}" \
            "${{ needs.resolve-coordinates.outputs.image_base }}" \
            "${{ needs.resolve-coordinates.outputs.image_tag }}" \
            "${{ needs.resolve-coordinates.outputs.branch_name }}"; do
            if [ -z "$value" ] || [ "$value" = "null" ] || [ "$value" = "undefined" ]; then
              echo "Coordinate resolution failed" >&2
              exit 1
            fi
          done

          echo "Registry configured"
          echo "${{ needs.resolve-coordinates.outputs.image_base }}"

      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: 'latest'

      - name: Decode kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 --decode > kubeconfig
        shell: bash

      - name: Deploy with Kustomize
        run: |
          find infra/k8s/prod -type f -name '*.yaml' -exec sed -i "s#REPLACE_WITH_REGISTRY#${{ needs.resolve-coordinates.outputs.image_base }}#g" {} +
          KUBECONFIG=kubeconfig kubectl apply -k infra/k8s/prod
        shell: bash

      - name: Verify rollout status
        run: |
          KUBECONFIG=kubeconfig kubectl rollout status deployment/auth-service --timeout=180s || true
          KUBECONFIG=kubeconfig kubectl rollout status deployment/invoice-service --timeout=180s || true
          KUBECONFIG=kubeconfig kubectl rollout status deployment/payment-service --timeout=180s || true
          KUBECONFIG=kubeconfig kubectl rollout status deployment/wallet-service --timeout=180s || true
          KUBECONFIG=kubeconfig kubectl rollout status deployment/fraud-service --timeout=180s || true
          KUBECONFIG=kubeconfig kubectl rollout status deployment/ledger-service --timeout=180s || true
          KUBECONFIG=kubeconfig kubectl rollout status deployment/compliance-service --timeout=180s || true
          KUBECONFIG=kubeconfig kubectl rollout status deployment/analytics-service --timeout=180s || true
          KUBECONFIG=kubeconfig kubectl rollout status deployment/audit-service --timeout=180s || true
        shell: bash
