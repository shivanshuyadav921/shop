name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: '24'
  KUBECTL_VERSION: 'latest'

jobs:
  build:
    name: Workspace build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Install kubeconform
        shell: bash
        run: |
          set -euo pipefail
          KUBECONFORM_VERSION="v0.6.7"
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz kubeconform
          sudo install -m 0755 kubeconform /usr/local/bin/kubeconform

      - name: Install dependencies
        run: npm install

      - name: Build all packages
        run: npm run build --workspaces

      - name: Render Kubernetes manifests
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          pwd
          kubectl kustomize ./infra/k8s/prod > /tmp/shop-platform.yaml

      - name: Validate Kubernetes manifests offline
        shell: bash
        run: |
          set -euo pipefail
          kubeconform -strict -summary /tmp/shop-platform.yaml

      - name: Validate Docker Compose files
        env:
          DATABASE_PASSWORD: ci-compose-validation-password
          GRAFANA_ADMIN_USER: ci-admin
          GRAFANA_ADMIN_PASSWORD: ci-compose-validation-grafana-password
          JWT_SECRET: ci-compose-validation-jwt-secret
          AUTH_NOTIFICATION_WEBHOOK_URL: https://example.invalid/auth-webhook
          AUTH_NOTIFICATION_WEBHOOK_TOKEN: ci-compose-validation-auth-webhook-token
          INTERNAL_API_TOKEN: ci-compose-validation-internal-api-token
          PAYMENT_PROVIDER_CONFIGS: '{"default":{"provider":"mock","enabled":true}}'
          COMPLIANCE_VERIFICATION_API_BASE_URL: https://example.invalid/compliance
          COMPLIANCE_VERIFICATION_API_TOKEN: ci-compose-validation-compliance-token
        run: |
          docker compose -f infra/docker-compose.yml config
          docker compose -f infra/docker-compose.prod.yml config

  resolve-coordinates:
    name: Resolve workflow coordinates
    needs: build
    runs-on: ubuntu-latest
    outputs:
      registry_input: ${{ steps.registry-input.outputs.registry_url }}
      registry_url: ${{ steps.coordinates.outputs.registry_url }}
      registry_host: ${{ steps.coordinates.outputs.registry_host }}
      registry_path: ${{ steps.coordinates.outputs.registry_path }}
      repository_owner: ${{ steps.coordinates.outputs.repository_owner }}
      repository_name: ${{ steps.coordinates.outputs.repository_name }}
      image_base: ${{ steps.coordinates.outputs.image_base }}
      image_tag: ${{ steps.coordinates.outputs.image_tag }}
      short_sha: ${{ steps.coordinates.outputs.short_sha }}
      branch_name: ${{ steps.coordinates.outputs.branch_name }}
      registry_source: ${{ steps.coordinates.outputs.registry_source }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve registry input
        id: registry-input
        shell: bash
        env:
          REGISTRY_URL_SECRET: ${{ secrets.REGISTRY_URL }}
          REGISTRY_URL_VAR: ${{ vars.REGISTRY_URL }}
        run: |
          set -euo pipefail

          registry_url="${REGISTRY_URL_SECRET:-}"
          registry_source="secret"

          if [ -z "$registry_url" ]; then
            registry_url="${REGISTRY_URL_VAR:-}"
            registry_source="variable"
          fi

          registry_url="$(printf '%s' "$registry_url" | tr -d '[:space:]')"
          echo "registry_url=${registry_url}" >> "$GITHUB_OUTPUT"
          echo "registry_source=${registry_source}" >> "$GITHUB_OUTPUT"

      - name: Resolve coordinates
        id: coordinates
        uses: ./.github/actions/resolve-coordinates
        with:
          registry_url: ${{ steps.registry-input.outputs.registry_url }}
          repository: ${{ github.repository }}
          repository_owner: ${{ github.repository_owner }}
          repository_name: ${{ github.event.repository.name || '' }}
          sha: ${{ github.sha }}
          ref: ${{ github.ref }}
          head_ref: ${{ github.head_ref || '' }}
          event_name: ${{ github.event_name }}

      - name: Verify resolved coordinates
        shell: bash
        run: |
          set -euo pipefail

          for value in \
            "${{ steps.coordinates.outputs.registry_url }}" \
            "${{ steps.coordinates.outputs.registry_host }}" \
            "${{ steps.coordinates.outputs.repository_owner }}" \
            "${{ steps.coordinates.outputs.repository_name }}" \
            "${{ steps.coordinates.outputs.image_base }}" \
            "${{ steps.coordinates.outputs.image_tag }}" \
            "${{ steps.coordinates.outputs.short_sha }}" \
            "${{ steps.coordinates.outputs.branch_name }}"; do
            if [ -z "$value" ] || [ "$value" = "null" ] || [ "$value" = "undefined" ]; then
              echo "Coordinate resolution failed" >&2
              exit 1
            fi
          done

          echo "Registry configured"
          echo "${{ steps.coordinates.outputs.registry_host }}"
          echo "${{ steps.coordinates.outputs.image_base }}"
          echo "${{ steps.coordinates.outputs.image_tag }}"
          echo "${{ steps.coordinates.outputs.registry_source }}"

  docker-publish:
    name: Build and publish service images
    needs:
      - build
      - resolve-coordinates
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - invoice-service
          - payment-service
          - wallet-service
          - fraud-service
          - ledger-service
          - compliance-service
          - analytics-service
          - audit-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify resolved coordinates
        shell: bash
        env:
          REGISTRY_URL: ${{ needs.resolve-coordinates.outputs.registry_url }}
        run: |
          set -euo pipefail

          test -n "${REGISTRY_URL:-}"

          for value in \
            "${REGISTRY_URL}" \
            "${{ needs.resolve-coordinates.outputs.registry_host }}" \
            "${{ needs.resolve-coordinates.outputs.image_base }}" \
            "${{ needs.resolve-coordinates.outputs.image_tag }}"; do
            if [ -z "$value" ] || [ "$value" = "null" ] || [ "$value" = "undefined" ]; then
              echo "Coordinate resolution failed" >&2
              exit 1
            fi
          done

          echo "Registry configured"
          echo "${{ needs.resolve-coordinates.outputs.registry_host }}"
          echo "${{ needs.resolve-coordinates.outputs.image_base }}"
          echo "${{ needs.resolve-coordinates.outputs.image_tag }}"

      - name: Resolve registry credentials
        id: registry-auth
        shell: bash
        env:
          REGISTRY_USERNAME_SECRET: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD_SECRET: ${{ secrets.REGISTRY_PASSWORD }}
          REGISTRY_HOST: ${{ needs.resolve-coordinates.outputs.registry_host }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          username="${REGISTRY_USERNAME_SECRET:-}"
          password="${REGISTRY_PASSWORD_SECRET:-}"

          if [ -n "$username" ] && [ -n "$password" ]; then
            :
          elif [ "${REGISTRY_HOST}" = "ghcr.io" ]; then
            username="${GITHUB_ACTOR}"
            password="${GITHUB_TOKEN}"
          else
            echo 'Registry credentials are missing for the configured registry' >&2
            exit 1
          fi

          echo "::add-mask::$username"
          echo "::add-mask::$password"
          echo "username=${username}" >> "$GITHUB_OUTPUT"
          echo "password=${password}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ needs.resolve-coordinates.outputs.registry_host }}
          username: ${{ steps.registry-auth.outputs.username }}
          password: ${{ steps.registry-auth.outputs.password }}

      - name: Build and push service image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ needs.resolve-coordinates.outputs.image_base }}/${{ matrix.service }}:${{ needs.resolve-coordinates.outputs.image_tag }}
            ${{ needs.resolve-coordinates.outputs.image_base }}/${{ matrix.service }}:latest
          file: ./Dockerfile
          build-args: |
            NODE_ENV=production
            SERVICE_NAME=${{ matrix.service }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to Kubernetes
    needs:
      - docker-publish
      - resolve-coordinates
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify resolved coordinates
        shell: bash
        env:
          REGISTRY_URL: ${{ needs.resolve-coordinates.outputs.registry_url }}
        run: |
          set -euo pipefail

          test -n "${REGISTRY_URL:-}"

          for value in \
            "${REGISTRY_URL}" \
            "${{ needs.resolve-coordinates.outputs.image_base }}" \
            "${{ needs.resolve-coordinates.outputs.image_tag }}" \
            "${{ needs.resolve-coordinates.outputs.branch_name }}"; do
            if [ -z "$value" ] || [ "$value" = "null" ] || [ "$value" = "undefined" ]; then
              echo "Coordinate resolution failed" >&2
              exit 1
            fi
          done

          echo "Registry configured"
          echo "${{ needs.resolve-coordinates.outputs.image_base }}"

      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Prepare deployment environment
        shell: bash
        env:
          REGISTRY_URL: ${{ needs.resolve-coordinates.outputs.registry_url }}
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          set -euo pipefail

          test -n "${REGISTRY_URL:-}"
          test -n "${KUBE_CONFIG_DATA:-}"

          echo "::add-mask::$KUBE_CONFIG_DATA"
          {
            echo "REGISTRY_URL=${REGISTRY_URL}"
            echo "KUBECONFIG=${GITHUB_WORKSPACE}/kubeconfig"
            echo "KUBE_CONFIG_DATA<<__KUBE_CONFIG_DATA__"
            echo "${KUBE_CONFIG_DATA}"
            echo "__KUBE_CONFIG_DATA__"
          } >> "$GITHUB_ENV"

      - name: Verify Kubernetes credentials
        shell: bash
        run: |
          set -euo pipefail

          test -n "${REGISTRY_URL:-}"

          if [ -z "${KUBE_CONFIG_DATA:-}" ]; then
            echo "KUBE_CONFIG_DATA is empty or unavailable in the deploy job scope" >&2
            exit 1
          fi

          echo "Kubernetes credentials configured"

      - name: Decode kubeconfig
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${KUBE_CONFIG_DATA:-}" ]; then
            echo "KUBE_CONFIG_DATA is empty or unset" >&2
            exit 1
          fi

          printf '%s' "${KUBE_CONFIG_DATA}" | base64 --decode > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"

      - name: Validate kubeconfig
        shell: bash
        run: |
          set -euo pipefail

          cluster_count="$(kubectl config view -o jsonpath='{.clusters[*].name}' | wc -w | tr -d ' ')"
          context_count="$(kubectl config view -o jsonpath='{.contexts[*].name}' | wc -w | tr -d ' ')"
          user_count="$(kubectl config view -o jsonpath='{.users[*].name}' | wc -w | tr -d ' ')"

          if [ "${cluster_count}" -eq 0 ]; then
            echo "Decoded kubeconfig contains no clusters" >&2
            exit 1
          fi

          if [ "${context_count}" -eq 0 ]; then
            echo "Decoded kubeconfig contains no contexts" >&2
            exit 1
          fi

          if [ "${user_count}" -eq 0 ]; then
            echo "Decoded kubeconfig contains no users" >&2
            exit 1
          fi

          current_context="$(kubectl config current-context 2>/dev/null || true)"

          if [ -z "${current_context}" ]; then
            if [ "${context_count}" -eq 1 ]; then
              current_context="$(kubectl config get-contexts -o name | head -n 1)"
              if [ -z "${current_context}" ]; then
                echo "Decoded kubeconfig has one context but it could not be resolved" >&2
                exit 1
              fi
              kubectl config use-context "${current_context}" >/dev/null
            else
              echo "Decoded kubeconfig is missing current-context and defines multiple contexts" >&2
              exit 1
            fi
          fi

      - name: Detect deployment target
        id: deploy-target
        shell: bash
        run: |
          set -euo pipefail

          current_context="$(kubectl config current-context)"
          cluster_name="$(kubectl config view --minify -o jsonpath='{.clusters[0].name}')"
          server="$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')"

          if [ -z "${cluster_name}" ] || [ -z "${server}" ]; then
            echo "Decoded kubeconfig is missing active cluster metadata" >&2
            exit 1
          fi

          echo "Current context: ${current_context}"
          echo "Server: ${server}"

          skip_deploy="false"
          server_lc="$(printf '%s' "${server}" | tr '[:upper:]' '[:lower:]')"
          context_lc="$(printf '%s' "${current_context}" | tr '[:upper:]' '[:lower:]')"
          cluster_lc="$(printf '%s' "${cluster_name}" | tr '[:upper:]' '[:lower:]')"

          if [[ "${server_lc}" == *"127.0.0.1"* ]] || [[ "${server_lc}" == *"localhost"* ]] || [[ "${context_lc}" == *"docker-desktop"* ]] || [[ "${context_lc}" == *"kind"* ]] || [[ "${context_lc}" == *"minikube"* ]] || [[ "${cluster_lc}" == *"docker-desktop"* ]] || [[ "${cluster_lc}" == *"kind"* ]] || [[ "${cluster_lc}" == *"minikube"* ]]; then
            skip_deploy="true"
          fi

          echo "current_context=${current_context}" >> "$GITHUB_OUTPUT"
          echo "cluster_name=${cluster_name}" >> "$GITHUB_OUTPUT"
          echo "server=${server}" >> "$GITHUB_OUTPUT"
          echo "skip_deploy=${skip_deploy}" >> "$GITHUB_OUTPUT"

      - name: Skip local Kubernetes deployment
        if: steps.deploy-target.outputs.skip_deploy == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Local Kubernetes cluster detected. GitHub-hosted runners cannot access localhost clusters. Skipping remote deployment."
          echo "Local Kubernetes cluster detected. Remote CI deployment skipped."

      - name: Confirm remote Kubernetes deployment
        if: steps.deploy-target.outputs.skip_deploy != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Remote Kubernetes cluster detected. Deployment proceeding."

      - name: Verify Kubernetes cluster
        run: |
          set -euo pipefail

          kubectl config get-contexts

          CONTEXT=$(kubectl config current-context)
          echo "Current context: $CONTEXT"

          SERVER=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')
          echo "Cluster server: $SERVER"

          if [[ "$CONTEXT" == *"docker-desktop"* ]] || \
             [[ "$CONTEXT" == *"kind"* ]] || \
             [[ "$CONTEXT" == *"minikube"* ]] || \
             [[ "$SERVER" == *"127.0.0.1"* ]] || \
             [[ "$SERVER" == *"localhost"* ]]; then

            echo "Local Kubernetes cluster detected."
            echo "GitHub-hosted runners cannot access localhost clusters."
            echo "Skipping remote deployment."
            exit 0
          fi

          echo "Remote Kubernetes cluster detected."
          kubectl cluster-info

      - name: Render deployment manifests
        id: manifests
        shell: bash
        working-directory: ${{ github.workspace }}
        env:
          IMAGE_BASE: ${{ needs.resolve-coordinates.outputs.image_base }}
          IMAGE_TAG: ${{ needs.resolve-coordinates.outputs.image_tag }}
        run: |
          set -euo pipefail
          pwd
          rendered_manifest="${RUNNER_TEMP}/shop-platform.rendered.yaml"

          kubectl kustomize ./infra/k8s/prod > "$rendered_manifest"

          kubectl apply --dry-run=client --validate=false -f "$rendered_manifest" >/dev/null

          echo "rendered_manifest=${rendered_manifest}" >> "$GITHUB_OUTPUT"

      - name: Deploy with Kustomize
        if: steps.deploy-target.outputs.skip_deploy != 'true'
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -f "${{ steps.manifests.outputs.rendered_manifest }}"

      - name: Verify rollout status
        if: steps.deploy-target.outputs.skip_deploy != 'true'
        shell: bash
        run: |
          set -euo pipefail
          kubectl rollout status deployment/auth-service -n shop-fintech --timeout=180s
          kubectl rollout status deployment/invoice-service -n shop-fintech --timeout=180s
          kubectl rollout status deployment/payment-service -n shop-fintech --timeout=180s
          kubectl rollout status deployment/wallet-service -n shop-fintech --timeout=180s
          kubectl rollout status deployment/fraud-service -n shop-fintech --timeout=180s
          kubectl rollout status deployment/ledger-service -n shop-fintech --timeout=180s
          kubectl rollout status deployment/compliance-service -n shop-fintech --timeout=180s
          kubectl rollout status deployment/analytics-service -n shop-fintech --timeout=180s
          kubectl rollout status deployment/audit-service -n shop-fintech --timeout=180s
